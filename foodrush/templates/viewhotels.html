{% extends "base.html" %}
{% load static %}
{% block content %}
<section id="testimonial">
  <div class="container">
    <div class="row h-100">
      <div class="col-lg-7 mx-auto text-center mb-6">
        <h5 class="fw-bold fs-3 fs-lg-5 lh-sm mb-3">Featured Restaurants</h5>
      </div>
    </div>

    <div class="row gx-2">
      {% for i in hotels %}
      <div class="col-sm-6 col-md-4 col-lg-3 h-100 mb-5">
        <div class="card card-span h-100 text-white rounded-3">
          <img class="img-fluid rounded-3 h-100" src="" alt="" />
          <div class="card-body ps-0">
            <div class="d-flex align-items-center mb-3">
                <a href="{% url 'users:viewmenu' i.id %}"><img  class="img-fluid"  src="{{i.image.url}}" alt="" ></a>
              <div class="flex-1 ms-3">

<h5 class="mb-0 fw-bold text-1000" >{{ i.hotel_name }}</h5>



              </div>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
