{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">

    <h2 class="text-danger">❌ Payment Failed</h2>
    <hr>

    {% if error %}
        <p><strong>Reason:</strong> {{ error }}</p>
    {% else %}
        <p>Unfortunately, your payment could not be completed.</p>
    {% endif %}

    <div class="mt-4">
        <a href="{% url 'order:cartview' %}" class="btn btn-outline-warning">
            Try Again
        </a>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
            Back to Home
        </a>
    </div>

</div>
{% endblock %}
